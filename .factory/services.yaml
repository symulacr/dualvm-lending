commands:
  install: cd dualvm && npm ci
  test: cd dualvm && npm test
  typecheck: cd dualvm && npx tsc --noEmit
  build: cd dualvm && npm run build
  compile: cd dualvm && npx hardhat compile
  compile_pvm: cd dualvm && npm run build:pvm:probes
  balance_check: cd dualvm && node scripts/check-testnet-balance.mjs
  lint: echo "ESLint not configured yet — lint is a no-op until ci-enhancement feature adds it"

services:
  vite-dev:
    start: cd dualvm && PORT=5173 npx vite --port 5173
    stop: lsof -ti :5173 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:5173
    port: 5173
    depends_on: []

  vite-preview:
    start: cd dualvm && npx vite preview --host 0.0.0.0 --port 4173
    stop: lsof -ti :4173 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:4173
    port: 4173
    depends_on: []
