commands:
  install: cd dualvm && npm ci && forge install
  test: cd dualvm && forge test
  test_verbose: cd dualvm && forge test -vvv
  typecheck: cd dualvm && npx tsc --noEmit
  build: cd dualvm && forge build
  compile: cd dualvm && forge build
  compile_pvm: cd dualvm && npm run build:pvm:probes
  balance_check: cd dualvm && node scripts/check-testnet-balance.mjs
  lint: cd dualvm && forge fmt --check
  # Legacy Hardhat commands (will be removed after M11 hardhat-removal-foundry-cleanup)
  test_hardhat: cd dualvm && TMPDIR=/var/tmp npm test
  build_hardhat: cd dualvm && npm run build

services:
  vite-dev:
    start: cd dualvm && PORT=5173 npx vite --port 5173
    stop: lsof -ti :5173 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:5173
    port: 5173
    depends_on: []

  vite-preview:
    start: cd dualvm && npx vite preview --host 0.0.0.0 --port 4173
    stop: lsof -ti :4173 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:4173
    port: 4173
    depends_on: []
