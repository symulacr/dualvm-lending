name: dualvm-ci

on:
  push:
  pull_request:

jobs:
  dualvm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dualvm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dualvm/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build app and contracts
        run: npm run build
