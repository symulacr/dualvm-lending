name: dualvm-ci

on:
  push:
  pull_request:

jobs:
  dualvm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dualvm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dualvm/package-lock.json

      - name: Install Node.js dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run Forge tests
        run: forge test

      - name: Forge build (contracts)
        run: forge build

      - name: Build frontend
        run: npm run build:app

      - name: Testnet smoke (read-only contract existence)
        run: node scripts/ci-smoke.mjs
        continue-on-error: true
