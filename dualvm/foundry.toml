[profile.default]
src = "contracts"
out = "out"
test = "test"
libs = ["node_modules", "lib"]
solc_version = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false
fs_permissions = [
  { access = "read", path = "./" },
  { access = "write", path = "./deployments/" }
]
